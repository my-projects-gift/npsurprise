<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="floating-bg">
        <div class="floating-item" style="left: 10%; animation-duration: 10s;">📸</div>
        <div class="floating-item" style="left: 80%; animation-duration: 12s;">✨</div>
    </div>

    <div class="gallery-container">
        <h1>Birthday Photos 📸</h1>
        <!-- Hanging Line -->
        <div class="line-one"></div>

        <!-- Photo Frame -->
        <div class="photo-frame-one">
            <img src="first.jpeg" alt="">
        </div>

        <div class="line-two"></div>

        <!-- Photo Frame -->
        <div class="photo-frame-two">
            <img src="second.jpeg" alt="">
        </div>

        <div class="line-three"></div>

        <!-- Photo Frame -->
        <div class="photo-frame-three">
            <img src="third.jpeg" alt="">
        </div>

        <div class="line-four"></div>

        <!-- Photo Frame -->
        <div class="photo-frame-four">
            <img src="fourth.jpeg" alt="">
        </div>

        <div class="line-five"></div>

        <!-- Photo Frame -->
        <div class="photo-frame-five">
            <img src="fifth.jpeg" alt="">
        </div>

        <div class="line-six"></div>

        <!-- Photo Frame -->
        <div class="photo-frame-six">
            <img src="sixth.jpeg" alt="">
        </div>

        <div class="line-seven"></div>

        <!-- Photo Frame -->
        <div class="photo-frame-seven">
            <img src="seventh.jpeg" alt="">
        </div>
    </div>
    <div class="audio">
        <div class="music-controls" style="text-align: center; margin: 20px 0;">
            <audio id="myAudio" src="Dude-Metro-Proposal-BGM.mp3" loop
                autoplay></audio>
            <button onclick="toggleMute()" id="muteBtn" class="mute-btn"
                style="padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background-color: #555; color: white; margin-left: 10px; display: inline-flex; align-items: center; gap: 5px;">🔊
                Mute</button>
        </div>

    </div>
    <a href="surprise.html" class="backsur">⬅ Back to Surprise</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>


</html>
